<style>
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #fff;
  }
  #emailLink {
    color: #0000EE;
    cursor: pointer;
    text-decoration: underline;
  }
  #emailLink.clicked {
    color: purple;
  }
  noscript a {
    color: purple;
  }
</style>
</head>
<body>

<div id="main"><b>Michael Seh</b> &nbsp;[<span id="emailLink" onclick="copyEmail()">view email</span>]</div>

<noscript>
<style>#main{display:none}</style>
<div><b>Michael Seh</b> &nbsp;[<a href="mailto:mail@michaelseh.com">mail@michaelseh.com</a>]</div>
</noscript>

<script>
function copyEmail() {
  var email = 'mail' + String.fromCharCode(64) + 'michaelseh.com';
  var link = document.getElementById('emailLink');
  var ta = document.createElement('textarea');
  ta.value = email;
  ta.setAttribute('readonly', '');
  ta.style.position = 'absolute';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  link.classList.add('clicked');
  link.textContent = email + ' copied!';
  setTimeout(function() {
    link.textContent = 'view email';
  }, 2000);
}
</script>

</body>
</html>
